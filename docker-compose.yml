services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    expose:
      - "8001"
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/api/health')"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 15s

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "3000:3000"
    environment:
      # Resolves to the backend container on the Docker internal network
      PYTHON_API_URL: http://backend:8001
    depends_on:
      backend:
        condition: service_healthy
